server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name live-model.ru www.live-model.ru vps1778841729.tech0.ru;

    root /var/www/model/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3847/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hermes dashboard (localhost:9119) — префикс /hermes/ для встраивания в UI model
    location /hermes/ {
        proxy_pass http://127.0.0.1:9119/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 127.0.0.1:9119;
        # Hermes на 127.0.0.1: uvicorn proxy-headers иначе видит внешний IP
        # в X-Forwarded-For и отклоняет /api/pty WebSocket (HTTP 403 → 1006 в браузере).
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /hermes;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
